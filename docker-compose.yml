version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: noveldb
    environment:
      POSTGRES_DB: noveldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"  # Changed to 5433 to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
