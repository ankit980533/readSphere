version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: noveldb-prod
    environment:
      POSTGRES_DB: noveldb
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: novel-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/noveldb
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-novel-platform}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_S3_ENABLED: ${AWS_S3_ENABLED:-false}
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  web:
    build: ./web
    container_name: novel-web
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
